# Configuración de build para Railway (nixpacks).
# El backend vive en backend/ pero el frontend que sirve está en frontend/,
# así que el proyecto se construye desde la raíz del repo.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["cd backend && npm ci --omit=dev"]

[start]
cmd = "cd backend && node server.js"

[variables]
NODE_ENV = "production"
